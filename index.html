<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Logic Match</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

.screen{
    display:none;
    min-height:100vh;
    padding:20px;
}

.active{
    display:block;
}

.container{
    max-width:500px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:40px;
    font-weight:bold;
    color:#e8d28f;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#b7c4db;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#243447;
    color:white;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
    color:white;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.green{
    background:#2f9e44;
}

.blue{
    background:#2563eb;
}

.gray{
    background:#475569;
}

.red{
    background:#dc2626;
}

.card-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:20px;
}

.card{
    background:#2563eb;
    padding:18px 10px;
    border-radius:10px;
    text-align:center;
    cursor:pointer;
    user-select:none;
    transition:0.2s;
    font-size:14px;
    min-height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.card.selected{
    background:#f59e0b;
}

.card.matched{
    background:#16a34a;
    pointer-events:none;
}

.card.wrong{
    background:#dc2626;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
    transform:none;
}

.info{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

.info-box{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.instructions{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    line-height:1.7;
    margin-bottom:20px;
}

.leaderboard-item{
    display:flex;
    justify-content:space-between;
    background:#1e293b;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
}

.loading{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.spinner{
    width:70px;
    height:70px;
    border:6px solid #e8d28f;
    border-top:6px solid transparent;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
</div>

<!-- REGISTER -->
<div class="screen active" id="registerScreen">
    <div class="container">
        <div class="title">LOGIC MATCH</div>
        <div class="subtitle">CREATE ACCOUNT</div>

        <input type="email" id="regEmail" placeholder="Email">
        <input type="text" id="regUsername" placeholder="Username">
        <input type="password" id="regPassword" placeholder="Password">
        <input type="password" id="regConfirm" placeholder="Confirm Password">

        <button class="green" onclick="register()">REGISTER</button>
        <button class="gray" onclick="showScreen('loginScreen')">
            Already have account? Login
        </button>
    </div>
</div>

<!-- LOGIN -->
<div class="screen" id="loginScreen">
    <div class="container">
        <div class="title">LOGIC MATCH</div>
        <div class="subtitle">LOGIN</div>

        <input type="text" id="loginUser" placeholder="Username or Email">
        <input type="password" id="loginPass" placeholder="Password">

        <button class="green" onclick="login()">LOGIN</button>
        <button class="blue" onclick="guestLogin()">CONTINUE AS GUEST</button>
        <button class="gray" onclick="showScreen('registerScreen')">
            Register
        </button>
    </div>
</div>

<!-- MENU -->
<div class="screen" id="menuScreen">
    <div class="container">
        <div class="title">LOGIC MATCH</div>
        <div class="subtitle" id="welcomeText"></div>

        <div class="instructions">
            <b>HOW TO PLAY</b><br><br>
            1. Tap card to select<br>
            2. Tap matching card<br>
            3. Match logical pairs<br>
            4. Finish before time ends<br>
            5. Correct: +100<br>
            6. Wrong: -25
        </div>

        <button class="green" onclick="startGame()">START GAME</button>
        <button class="blue" onclick="showLeaderboard()">LEADERBOARD</button>
        <button class="red" onclick="logout()">LOGOUT</button>
    </div>
</div>

<!-- GAME -->
<div class="screen" id="gameScreen">
    <div class="container">

        <div class="info">
            <div class="info-box" id="scoreBox">Score: 0</div>
            <div class="info-box" id="timeBox">Time: 60</div>
            <div class="info-box" id="levelBox">Level: 1</div>
            <div class="info-box" id="pairBox">Pairs: 0</div>
        </div>

        <div class="instructions" id="themeBox"></div>

        <div class="card-grid" id="cardGrid"></div>

        <button class="gray" onclick="resetLevel()">RESET</button>
        <button class="green" id="nextBtn" onclick="nextLevel()" disabled>NEXT</button>
        <button class="red" onclick="backMenu()">MENU</button>

    </div>
</div>

<!-- LEADERBOARD -->
<div class="screen" id="leaderboardScreen">
    <div class="container">
        <div class="title">LEADERBOARD</div>

        <div id="leaderboardList"></div>

        <button class="gray" onclick="showScreen('menuScreen')">
            BACK
        </button>
    </div>
</div>

function showLoading(){
    document.getElementById("loading").style.display="flex";
}

function hideLoading(){
    document.getElementById("loading").style.display="none";
}

function showScreen(id){
    document.querySelectorAll(".screen").forEach(s=>{
        s.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
}

function register(){
    let email=document.getElementById("regEmail").value;
    let username=document.getElementById("regUsername").value;
    let password=document.getElementById("regPassword").value;
    let confirm=document.getElementById("regConfirm").value;

    if(!email || !username || !password){
        alert("Fill all fields");
        return;
    }

    if(password!==confirm){
        alert("Passwords do not match");
        return;
    }

    let users=JSON.parse(localStorage.getItem("users")||"[]");

    let exist=users.find(u=>u.username===username || u.email===email);

    if(exist){
        alert("User already exists");
        return;
    }

    users.push({
        email,
        username,
        password
    });

    localStorage.setItem("users",JSON.stringify(users));

    alert("Registration successful!");
    showScreen("loginScreen");
}

function login(){
    let user=document.getElementById("loginUser").value;
    let pass=document.getElementById("loginPass").value;

    let users=JSON.parse(localStorage.getItem("users")||"[]");

    let found=users.find(u=>
        (u.username===user || u.email===user)
        && u.password===pass
    );

    if(found){
        currentUser=found.username;
        enterMenu();
    }else{
        alert("Invalid credentials");
    }
}

function guestLogin(){
    currentUser="Guest";
    enterMenu();
}

function enterMenu(){
    document.getElementById("welcomeText").innerText=
        "Welcome, "+currentUser+"!";
    showScreen("menuScreen");
}

function logout(){
    currentUser="Guest";
    showScreen("loginScreen");
}

function startGame(){
    score=0;
    matchedPairs=0;
    timer=60;
    levelComplete=false;

    updateInfo();

    showScreen("gameScreen");

    loadLevel(level);

    clearInterval(interval);

    interval=setInterval(()=>{
        timer--;
        updateInfo();

        if(timer<=0){
            clearInterval(interval);
            alert("Time's up!");
        }
    },1000);
}

function updateInfo(){
    document.getElementById("scoreBox").innerText="Score: "+score;
    document.getElementById("timeBox").innerText="Time: "+timer;
    document.getElementById("levelBox").innerText="Level: "+level;
    document.getElementById("pairBox").innerText=
        "Pairs: "+matchedPairs;
}

function loadLevel(levelNum){
    let levelData=levels[levelNum];

    levelComplete=false;
    document.getElementById("nextBtn").disabled=true;

    document.getElementById("themeBox").innerHTML=
        "<b>"+levelData.theme+"</b>";

    let cards=[];

    levelData.pairs.forEach((pair,index)=>{
        cards.push({
            text:pair[0],
            pair:index,
            side:"left"
        });

        cards.push({
            text:pair[1],
            pair:index,
            side:"right"
        });
    });

    cards.sort(()=>Math.random()-0.5);

    const grid=document.getElementById("cardGrid");
    grid.innerHTML="";

    cards.forEach(card=>{
        let div=document.createElement("div");
        div.className="card";
        div.innerText=card.text;

        div.onclick=()=>selectCard(div,card);

        grid.appendChild(div);
    });
}

function selectCard(element,card){

    if(element.classList.contains("matched")) return;

    if(!selectedCard){
        selectedCard={element,card};
        element.classList.add("selected");
        return;
    }

    if(selectedCard.element===element) return;

    let first=selectedCard;

    if(
        first.card.pair===card.pair &&
        first.card.side!==card.side
    ){

        first.element.classList.remove("selected");

        first.element.classList.add("matched");
        element.classList.add("matched");

        matchedPairs++;
        score+=100;

        updateInfo();

        if(matchedPairs===levels[level].pairs.length){

            clearInterval(interval);
            levelComplete=true;
            if(level < 30){
                document.getElementById("nextBtn").disabled=false;
            }

            score += timer*3;

            saveScore();

            setTimeout(()=>{
                if(level < 30){
                    alert("Level Complete!\nFinal Score: "+score+"\nPress NEXT to continue.");
                } else {
                    alert("Final Level Complete!\nFinal Score: "+score);
                    showScreen("menuScreen");
                }
            },300);
        }

    }else{

        score=Math.max(0,score-25);

        first.element.classList.remove("selected");

        first.element.classList.add("wrong");
        element.classList.add("wrong");

        setTimeout(()=>{
            first.element.classList.remove("wrong");
            element.classList.remove("wrong");
        },500);

        updateInfo();
    }

    selectedCard=null;
}

function nextLevel(){
    if(!levelComplete){
        alert("Complete the current level before moving next.");
        return;
    }

    if(level >= 30){
        alert("You have completed all levels.");
        return;
    }

    level++;
    matchedPairs = 0;
    timer = 60;
    levelComplete=false;
    document.getElementById("nextBtn").disabled=true;
    updateInfo();
    loadLevel(level);
    clearInterval(interval);
    interval = setInterval(()=>{
        timer--;
        updateInfo();

        if(timer<=0){
            clearInterval(interval);
            alert("Time's up!");
        }
    },1000);
}

function resetLevel(){
    startGame();
}

function backMenu(){
    clearInterval(interval);
    showScreen("menuScreen");
}

function saveScore(){
    let board=JSON.parse(localStorage.getItem("leaderboard")||"[]");

    board.push({
        user:currentUser,
        score:score
    });

    board.sort((a,b)=>b.score-a.score);

    localStorage.setItem("leaderboard",JSON.stringify(board));
}

function showLeaderboard(){

    let board=JSON.parse(localStorage.getItem("leaderboard")||"[]");

    let list=document.getElementById("leaderboardList");

    list.innerHTML="";

    if(board.length===0){
        list.innerHTML="<p>No scores yet.</p>";
    }

    board.slice(0,10).forEach((item,index)=>{

        let row=document.createElement("div");
        row.className="leaderboard-item";

        row.innerHTML=`
            <span>#${index+1}</span>
            <span>${item.user}</span>
            <span>${item.score}</span>
        `;

        list.appendChild(row);
    });

    showScreen("leaderboardScreen");
}
</script>
